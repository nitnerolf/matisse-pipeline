coverage:
  status:
    project:
      default:
        informational: true
    patch:
      default:
        informational: true
        target: 90%   # objectif
        threshold: 5% # tolérance (ex: 78–82%)

comment:
  layout: reach, diff, flags, files
  behavior: default
  require_changes: false
  require_base: yes
  require_head: yes

ignore:
- src/matisse/legacy/**/*
